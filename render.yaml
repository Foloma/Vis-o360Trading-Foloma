services:
  - type: web
    name: visao360-jf
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: visao360-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9
