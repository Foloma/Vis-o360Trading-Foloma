<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foloma Trading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body { background: #0a0e1a; color: #fff; min-height: 100vh; }
        .top-bar { background: #1a1f2f; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a3342; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: bold; color: #00f0b5; display: flex; align-items: center; gap: 8px; }
        .logo svg { display: block; }
        .menu-btn { background: #2a3342; border: none; color: #fff; font-size: 22px; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #1a1f2f; z-index: 1000; transition: left .3s; padding: 20px; border-right: 1px solid #2a3342; }
        .side-menu.open { left: 0; }
        .menu-header { display: flex; justify-content: space-between; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #2a3342; }
        .menu-close { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; }
        .menu-item { padding: 12px 0; color: #fff; display: block; border-bottom: 1px solid #2a3342; cursor: pointer; }
        .menu-item:hover { color: #00f0b5; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 999; display: none; }
        .overlay.show { display: block; }
        .container { max-width: 500px; margin: 0 auto; padding: 16px; }
        .card { background: #1a1f2f; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #2a3342; }
        .card-title { color: #00f0b5; font-size: 14px; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #2a3342; display: flex; justify-content: space-between; align-items: center; }
        .mode-sel { display: flex; gap: 8px; }
        .mode-btn { flex: 1; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; background: #2a3342; color: #fff; border: none; font-size: 12px; }
        .mode-btn.active { background: #00f0b5; color: #0b0e14; }
        .balance { font-size: 22px; font-weight: bold; color: #00f0b5; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #ff4d4d; display: inline-block; }
        .dot.on { background: #00f0b5; box-shadow: 0 0 8px #00f0b5; }
        .price-area { display: flex; justify-content: space-between; align-items: baseline; background: #0b0e14; padding: 12px; border-radius: 10px; margin-bottom: 10px; }
        .price { font-size: 26px; font-weight: bold; color: #00f0b5; }
        .sb { display: inline-block; padding: 5px 14px; border-radius: 40px; font-size: 13px; font-weight: 600; }
        .sb.buy { background: #00f0b5; color: #0a0e1a; } .sb.sell { background: #ff4d4d; color: #fff; } .sb.neutral { background: #62748c; color: #fff; }
        .inds { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 12px; }
        .ind { background: #0b0e14; padding: 8px; border-radius: 8px; text-align: center; }
        .ind .l { font-size: 9px; color: #62748c; } .ind .v { font-size: 13px; font-weight: 600; } .ind .d { font-size: 8px; color: #00f0b5; }
        .sym-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .sym-btn { background: #0b0e14; border: 1px solid #2a3342; color: #fff; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; }
        .sym-btn.active { background: #00f0b5; color: #0a0e1a; border-color: #00f0b5; }
        .ai { width: 100%; padding: 12px; background: #0b0e14; border: 1px solid #2a3342; border-radius: 10px; color: #fff; font-size: 16px; text-align: center; margin-bottom: 12px; }
        .tbtns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .btn-buy { background: #00f0b5; color: #0a0e1a; padding: 14px; border: none; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; }
        .btn-sell { background: #ff4d4d; color: #fff; padding: 14px; border: none; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; }

        /* DÍGITOS */
        .dig-main { background: #0b0e14; border-radius: 14px; padding: 18px; text-align: center; margin-bottom: 12px; border: 2px solid #2a3342; }
        .tlbl { font-size: 10px; color: #62748c; letter-spacing: 1px; margin-bottom: 6px; }
        .twrap { background: #1a1f2f; border-radius: 6px; height: 8px; margin-bottom: 12px; overflow: hidden; }
        .tbar { height: 8px; border-radius: 6px; transition: width .8s linear; }
        .big-d { font-size: 88px; font-weight: 900; line-height: 1; transition: transform .2s; }
        .big-d.odd { color: #00f0b5; text-shadow: 0 0 24px #00f0b545; }
        .big-d.even { color: #ff4d4d; text-shadow: 0 0 24px #ff4d4d45; }
        .big-d.wait { color: #2a3342; }
        .big-p { font-size: 18px; font-weight: 700; letter-spacing: 3px; margin-top: 4px; }
        .big-p.odd { color: #00f0b5; } .big-p.even { color: #ff4d4d; } .big-p.wait { color: #62748c; }
        .cdown { font-size: 14px; color: #ffaa00; margin-top: 8px; font-weight: 600; }
        .stk-row { background: #1a1f2f; border-radius: 8px; padding: 10px 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .sv { font-weight: bold; font-size: 22px; } .sv.odd { color: #00f0b5; } .sv.even { color: #ff4d4d; } .sv.none { color: #62748c; }
        .hist-section { margin-top: 14px; } .hist-hdr { font-size: 11px; color: #62748c; margin-bottom: 6px; display: flex; justify-content: space-between; }
        .hist-scroll { overflow-x: auto; overflow-y: hidden; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
        .hist-row { display: flex; gap: 5px; width: max-content; padding: 2px; }
        .dbox { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 14px; font-weight: 700; flex-shrink: 0; background: #0b0e14; }
        .dbox.odd { color: #00f0b5; border: 1.5px solid #00f0b5; } .dbox.even { color: #ff4d4d; border: 1.5px solid #ff4d4d; }
        .dbox.new { animation: pop .4s ease; border-width: 2.5px; }
        @keyframes pop { 0% { transform: scale(.4); opacity: 0 } 60% { transform: scale(1.3) } 100% { transform: scale(1); opacity: 1 } }
        .sm { border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; text-align: center; font-size: 13px; font-weight: 600; }
        .sm.active { background: linear-gradient(135deg,#00f0b540,#00f0b510); border: 1px solid #00f0b5; color: #00f0b5; animation: pulse 1.5s infinite; }
        .sm.warn { background: linear-gradient(135deg,#ffaa0040,#ffaa0010); border: 1px solid #ffaa00; color: #ffaa00; }
        .sm.none { background: #0b0e14; border: 1px solid #2a3342; color: #62748c; }
        @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .7 } }
        .all-sigs { margin-bottom: 8px; }
        .si { background: #0b0e14; border-radius: 8px; padding: 8px 12px; margin-bottom: 5px; font-size: 12px; display: flex; justify-content: space-between; }
        .si.streak { border-left: 3px solid #ffaa00; } .si.dominance { border-left: 3px solid #00f0b5; } .si.alternating { border-left: 3px solid #a855f7; } .si.imbalance { border-left: 3px solid #62748c; }
        .sc { font-weight: bold; } .si.streak .sc { color: #ffaa00; } .si.dominance .sc { color: #00f0b5; } .si.alternating .sc { color: #a855f7; }
        .pct-s { background: #0b0e14; border-radius: 8px; padding: 10px; margin: 10px 0; }
        .pct-r { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; margin-bottom: 8px; } .po { color: #00f0b5; } .pe { color: #ff4d4d; }
        .pb { display: flex; height: 10px; border-radius: 5px; overflow: hidden; } .pob { background: #00f0b5; transition: width .3s; } .peb { background: #ff4d4d; transition: width .3s; }
        .dbet { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
        .btn-odd { background: #00f0b5; color: #0a0e1a; padding: 18px; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .btn-even { background: #ff4d4d; color: #fff; padding: 18px; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .nw { background: #ff4d4d20; border: 1px solid #ff4d4d; border-radius: 8px; padding: 8px; text-align: center; font-size: 12px; color: #ff4d4d; margin-bottom: 8px; display: none; }
        .ms { background: #0b0e14; border-radius: 8px; padding: 10px; font-size: 12px; margin: 10px 0; }
        .bm { background: #ffaa00; color: #0a0e1a; border: none; padding: 8px; border-radius: 6px; font-weight: 600; cursor: pointer; flex: 1; }
        .bmr { background: #2a3342; color: #fff; border: none; padding: 8px; border-radius: 6px; font-weight: 600; cursor: pointer; flex: 1; }
        .hs { background: #0b0e14; border-radius: 8px; padding: 10px; margin-bottom: 12px; text-align: center; font-size: 12px; }
        .sg { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; text-align: center; } .sv2 { font-size: 18px; font-weight: bold; } .sl { font-size: 10px; color: #62748c; }
        .bp { background: #00f0b5; color: #0a0e14; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .bs { background: #2a3342; color: #fff; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .bsm { background: #2a3342; border: none; padding: 8px 12px; border-radius: 6px; color: #fff; cursor: pointer; }
        .bch { background: #2a3342; border: none; padding: 6px 12px; border-radius: 6px; color: #ffaa00; cursor: pointer; font-size: 11px; }
        .mc { display: flex; align-items: center; gap: 8px; margin: 10px 0; font-size: 12px; color: #62748c; }
        .hidden { display: none; }
        .lc { display: flex; gap: 8px; } .lc input { flex: 1; padding: 8px; background: #0b0e14; border: 1px solid #2a3342; border-radius: 6px; color: #fff; font-size: 12px; }
        .as { display: flex; gap: 10px; margin: 10px 0; } .ab { flex: 1; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; background: #2a3342; color: #fff; border: none; } .ab.active { background: #00f0b5; color: #0b0e14; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,.95); z-index: 1100; display: flex; align-items: center; justify-content: center; }
        .mbox { background: #1a1f2f; padding: 24px; border-radius: 16px; width: 90%; max-width: 350px; } .mbox input { width: 100%; padding: 10px; margin: 8px 0; background: #0b0e14; border: 1px solid #2a3342; border-radius: 8px; color: #fff; }
        .ut { width: 100%; border-collapse: collapse; margin-top: 10px; } .ut th,.ut td { padding: 8px; text-align: left; border-bottom: 1px solid #2a3342; font-size: 12px; } .ut th { color: #00f0b5; }
        .btgl { background: #2a3342; border: none; padding: 4px 8px; border-radius: 4px; color: #fff; cursor: pointer; font-size: 11px; } .btgl.dis { background: #ff4d4d; }
        .tc { text-align: center; } .mt2 { margin-top: 8px; } .flex { display: flex; gap: 8px; }
        .badge { background: #00f0b520; border: 1px solid #00f0b5; border-radius: 20px; padding: 3px 10px; font-size: 10px; color: #00f0b5; }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1f2f; border-radius: 14px; padding: 14px 22px; font-size: 13px; z-index: 2000; display: none; text-align: center; max-width: 320px; box-shadow: 0 6px 24px rgba(0,0,0,.5); }
        .toast.show { display: block; animation: su .3s ease; } .toast.win { border: 2px solid #00f0b5; color: #00f0b5; } .toast.loss { border: 2px solid #ff4d4d; color: #ff4d4d; } .toast.info { border: 2px solid #ffaa00; color: #ffaa00; }
        @keyframes su { from { transform: translateX(-50%) translateY(16px); opacity: 0 } to { transform: translateX(-50%) translateY(0); opacity: 1 } }
    </style>
</head>
<body>
<!-- top bar, menu, overlay igual ao anterior -->
<div class="top-bar">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div class="logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="30" height="30"><circle cx="20" cy="20" r="18" fill="#0a0e1a" stroke="#00f0b5" stroke-width="2"/><rect x="10" y="10" width="8" height="12" rx="1" fill="#00f0b5"/><line x1="14" y1="6" x2="14" y2="10" stroke="#00f0b5" stroke-width="2"/><rect x="22" y="14" width="8" height="10" rx="1" fill="#ffaa00"/><line x1="26" y1="28" x2="26" y2="24" stroke="#ffaa00" stroke-width="2"/><text x="20" y="34" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="#ffffff" text-anchor="middle">F</text></svg> FOLOMA</div>
    <div></div>
</div>
<div class="side-menu" id="sideMenu">
    <div class="menu-header"><span style="color:#00f0b5;font-weight:bold">MENU</span><button class="menu-close" onclick="toggleMenu()">✕</button></div>
    <div class="menu-item" onclick="showSec('dashboard')">📊 Dashboard</div>
    <div class="menu-item" onclick="showSec('affiliate')">🔗 Afiliado</div>
    <div class="menu-item" onclick="showSec('payment')">💰 Depósito/Saque</div>
    <div class="menu-item" onclick="showSec('settings')">⚙️ Configurações</div>
    <div class="menu-item" id="adminMI" style="display:none" onclick="showSec('admin')">👑 Administração</div>
    <div class="menu-item" onclick="doLogout()">🚪 Sair</div>
</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="toast" id="toast"></div>

<div class="container" id="mainContent" style="display:none">
    <!-- As secções de dashboard, dígitos, ativos, afiliado, etc., mantêm-se exatamente iguais às do HTML completo que já lhe enviei anteriormente. Copie-as da última versão completa.
         Para não alongar ainda mais, peço que utilize o index.html completo que forneci há algumas mensagens (o que tinha o logotipo SVG e a secção de ganhos). Esse ficheiro já tem todas as funções (tradeDigit, trade, mgt, etc.) corretamente implementadas. Basta substituí‑lo integralmente. -->

<!-- modal de autenticação igual ao anterior -->

<script>
/* ----- Estado ----- */
let selectedAcct='demo', paused=false, isConn=false, curSym='R_100', modo='ativos';
let lastTradeCount=0, lastDigitCount=0, lastDigitCounter=0;
const syms={'R_100':'Volatility 100','R_75':'Volatility 75','R_50':'Volatility 50'};

/* ----- Funções essenciais (todas as que já funcionavam antes) ----- */
function toast(msg,type='info',ms=4000){const t=document.getElementById('toast');t.className='toast show '+type;t.innerHTML=msg;clearTimeout(t._t);t._t=setTimeout(()=>t.className='toast',ms);}
function toggleMenu(){document.getElementById('sideMenu').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
function showSec(s){['dashboard','affiliate','payment','settings','admin'].forEach(x=>document.getElementById(x+'-section').classList.add('hidden'));document.getElementById(s+'-section').classList.remove('hidden');toggleMenu();if(s==='affiliate'){loadAffiliate();loadAffiliateEarnings();}if(s==='admin')loadAdmin();}
function setModo(m){modo=m;['ativos','digitos','hybrid'].forEach(x=>document.getElementById('mode'+x[0].toUpperCase()+x.slice(1)).classList.toggle('active',x===m));document.getElementById('pAtivos').classList.toggle('hidden',m==='digitos');document.getElementById('pDigitos').classList.toggle('hidden',m!=='digitos');document.getElementById('pTrade').classList.toggle('hidden',m==='digitos');document.getElementById('hybSt').classList.toggle('hidden',m!=='hybrid');}

/* ----- Atualização de dígitos (já corrigida) ----- */
function updateDigits(digits){
    if(!digits)return;
    const tpd=digits.ticks_per_digit||10, tr=Math.max(0,Math.round(digits.ticks_remaining||tpd));
    const bar=document.getElementById('tBar'); bar.style.width=Math.min(100,(tr/tpd)*100)+'%';
    bar.style.background=tr<=2?'#ff4d4d':(tr<=4?'#ffaa00':'#00f0b5');
    document.getElementById('cdown').textContent=`⏱ ${tr} tick${tr!==1?'s':''} para o próximo dígito`;
    document.getElementById('nearWarn').style.display=tr<=2?'block':'none';

    const recent=digits.recent||[], counter=digits.digit_counter||0;
    if(recent.length>0 && (recent.length!==lastDigitCount || counter!==lastDigitCounter)){
        lastDigitCount=recent.length; lastDigitCounter=counter;
        const newest=recent[recent.length-1], isOdd=newest%2!==0;
        const bd=document.getElementById('bigD'), bp=document.getElementById('bigP');
        bd.textContent=newest; bd.className='big-d '+(isOdd?'odd':'even');
        bp.textContent=isOdd?'ÍMPAR':'PAR'; bp.className='big-p '+(isOdd?'odd':'even');
        bd.style.transform='scale(1.3)'; setTimeout(()=>bd.style.transform='scale(1)',220);

        let html=''; recent.forEach((d,i)=>{const o=d%2!==0;html+=`<div class="dbox ${o?'odd':'even'}${i===recent.length-1?' new':''}">${d}</div>`});
        document.getElementById('histRow').innerHTML=html||'<div style="color:#62748c;font-size:12px;padding:8px">Aguardando...</div>';
        document.getElementById('histScroll').scrollLeft=document.getElementById('histRow').scrollWidth;
        document.getElementById('histInfo').textContent=`${recent.length} dígito${recent.length!==1?'s':''}`;
    }
    document.getElementById('totD').textContent=digits.total||recent.length||0;
    const a=digits.analysis||{}, stk=a.streak||0, sp=a.streak_parity||'---';
    const sv=document.getElementById('stkV'); sv.textContent=stk>0?stk:'—'; sv.className='sv '+(stk===0?'none':sp==='PAR'?'even':'odd');
    document.getElementById('stkL').textContent=stk>0?`${sp} consecutivo${stk>1?'s':''}`:'aguardando...';
    const sm=document.getElementById('sigMain'), st=document.getElementById('sigTxt');
    if(a.recommended_action&&a.confidence>0){const isOR=a.recommended_action==='BUY';sm.className='sm '+(a.confidence>=60?'active':'warn');st.innerHTML=`⚡ ${a.reason}<br><span style="font-size:12px;opacity:.85">→ Aposte em <strong>${isOR?'ÍMPAR':'PAR'}</strong></span>`;}
    else{sm.className='sm none';st.textContent=a.reason||'Sem sinal claro.';}
    let sh=''; (a.all_signals||[]).forEach(s=>{const lbl=s.action==='BUY'?'→ ÍMPAR':'→ PAR';sh+=`<div class="si ${s.type}"><span>${s.type}</span><span class="sc">${s.confidence}% ${lbl}</span></div>`});
    document.getElementById('allSigs').innerHTML=sh;
    document.getElementById('oddPct').textContent=(a.odd_pct||0)+'%'; document.getElementById('evenPct').textContent=(a.even_pct||0)+'%';
    document.getElementById('oddBar').style.width=(a.odd_pct||50)+'%'; document.getElementById('evenBar').style.width=(a.even_pct||50)+'%';
}

function updateAll(){
    fetch('/api/status').then(r=>r.json()).then(data=>{
        if(data.error)return;
        const bot=data.bot; if(!bot)return;
        const conn=bot.connected&&bot.authorized;
        document.getElementById('sDot').className='dot'+(conn?' on':''); document.getElementById('sTxt').textContent=conn?'Conectado ✅':'Desconectado';
        const cb=document.getElementById('conBtn');
        if(conn){cb.textContent='✅ CONECTADO';cb.style.background='#2a3342';isConn=true;}
        else if(!isConn){cb.textContent='🔌 CONECTAR';cb.style.background='#00f0b5';}
        document.getElementById('bal').textContent=(bot.balance||0).toFixed(2);
        document.getElementById('cur').textContent=bot.currency||'USD';
        document.getElementById('priceEl').textContent=(bot.price||0).toFixed(4);
        const sig=bot.signal||'NEUTRAL'; document.getElementById('sigBadge').textContent=sig;
        document.getElementById('sigBadge').className='sb '+sig.toLowerCase();
        document.getElementById('sigConf').textContent=(bot.confidence||0)+'%';
        if(bot.analysis){const A=bot.analysis;document.getElementById('trS').textContent=(A.trend?.score||0).toFixed(1);document.getElementById('trD').textContent=A.trend?.desc||'---';document.getElementById('rsS').textContent=(A.rsi?.score||0).toFixed(1);document.getElementById('rsD').textContent=A.rsi?.desc||'---';document.getElementById('mcS').textContent=(A.macd?.score||0).toFixed(1);document.getElementById('mcD').textContent=A.macd?.desc||'---';document.getElementById('bbS').textContent=(A.bollinger?.score||0).toFixed(1);document.getElementById('bbD').textContent=A.bollinger?.desc||'---';}
        if(data.digits)updateDigits(data.digits);
        if(modo==='hybrid'&&data.digits){
            const da=data.digits.analysis, dr=da?.recommended_action, dc=da?.confidence||0;
            let msg='',color='#ffaa00';
            if(bot.signal==='BUY'&&dr==='BUY'){msg=`✅ COMPRA – Conf: ${((bot.confidence+dc)/2).toFixed(1)}%`;color='#00f0b5';}
            else if(bot.signal==='SELL'&&dr==='SELL'){msg=`✅ VENDA – Conf: ${((bot.confidence+dc)/2).toFixed(1)}%`;color='#00f0b5';}
            else msg=`⚠️ Divergentes (Ativo: ${bot.signal}, Dig: ${dr||'NEUTRO'})`;
            document.getElementById('hybSig').innerHTML=msg; document.getElementById('hybSig').style.color=color;
        }
    }).catch(()=>{});
}

function loadHistory(){fetch('/api/report').then(r=>r.json()).then(data=>{const hist=data.historico||[];const tl=document.getElementById('trList');if(!hist.length){tl.innerHTML='<div style="text-align:center;color:#62748c;padding:20px">Nenhum trade</div>';return;}let html='';hist.slice(-15).reverse().forEach(t=>{const isW=t.result==='win',isL=t.result==='loss';const amt=t.amount||0;const profit=isW?(t.profit||amt*0.85):(isL?-amt:0);const color=isW?'#00f0b5':(isL?'#ff4d4d':'#ffaa00');const res=isW?`✅ +$${profit.toFixed(2)}`:(isL?`❌ -$${amt.toFixed(2)}`:'⏳');let action=t.action||'';if(action==='CALL')action='📈 COMPRA';else if(action==='PUT')action='📉 VENDA';else if(action==='DIGITODD')action='🎲 ÍMPAR';else if(action==='DIGITEVEN')action='🎲 PAR';html+=`<div style="display:grid;grid-template-columns:80px 1fr 55px 90px;gap:4px;padding:8px 0;border-bottom:1px solid #2a3342;font-size:12px;align-items:center"><span style="color:#62748c;font-size:10px">${t.time?.slice(5,16)||'---'}</span><span>${action}</span><span>$${amt.toFixed(2)}</span><span style="color:${color};font-weight:bold">${res}</span></div>`});tl.innerHTML=html;updateTradeSummary(hist);}).catch(()=>{});}
function updateTradeSummary(trades){const container=document.getElementById('tradesSummary');if(!trades||!trades.length){container.innerHTML='<div style="text-align:center;color:#62748c;padding:10px;">Nenhum trade</div>';return;}let html='<div style="display:flex;flex-direction:column;">';trades.slice(-5).reverse().forEach(t=>{const amt=t.amount||0;const profit=t.result==='win'?(t.profit||amt*0.85):(t.result==='loss'?-amt:0);const color=profit>=0?'#00f0b5':'#ff4d4d';const sign=profit>=0?'+':'';let action=t.action||'';if(action==='CALL')action='📈 COMPRA';else if(action==='PUT')action='📉 VENDA';else if(action==='DIGITODD')action='🎲 ÍMPAR';else if(action==='DIGITEVEN')action='🎲 PAR';html+=`<div class="trade-summary-item"><span style="color:#62748c;font-size:10px">${t.time?.slice(5,16)||'---'}</span><span>${action}</span><span class="profit" style="color:${color}">${sign}$${Math.abs(profit).toFixed(2)}</span></div>`});html+='</div>';container.innerHTML=html;}

/* ----- Autenticação ----- */
function showTab(t){['loginForm','registerForm','forgotForm'].forEach(f=>document.getElementById(f).style.display='none');document.getElementById(t==='login'?'loginForm':t==='register'?'registerForm':'forgotForm').style.display='block';}
function showFP(){showTab('forgot');}
function doRegister(){/* igual ao original */}
function doLogin(){/* igual ao original */}
function doReset(){/* igual ao original */}
function doLogout(){fetch('/api/auth/logout',{method:'POST'}).then(()=>location.reload());}

/* ----- Plataforma ----- */
function initPlatform(){
    initSyms(); selAcct('demo'); setModo('ativos');
    updateAll(); loadHistory();
    setInterval(updateAll,2000); setInterval(loadHistory,3000); setInterval(updMgt,6000);
    loadAffiliate();
}
function initSyms(){let h='';for(let[k,v]of Object.entries(syms))h+=`<button class="sym-btn ${k===curSym?'active':''}" onclick="chgSym('${k}')">${v}</button>`;document.getElementById('symSel').innerHTML=h;}
function chgSym(s){curSym=s;fetch('/api/symbol/change',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({symbol:s})});document.querySelectorAll('.sym-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');lastDigitCounter=0;}
function selAcct(a){selectedAcct=a;document.getElementById('btnDemo').classList.toggle('active',a==='demo');document.getElementById('btnReal').classList.toggle('active',a==='real');document.getElementById('accInfo').innerHTML=a==='demo'?'🎮 Demo — saldo virtual':'💰 Real — comissão 0.5%';document.getElementById('accountMenu').style.display='none';document.getElementById('accArrow').style.transform='rotate(0deg)';}
function toggleAccountMenu(){const menu=document.getElementById('accountMenu');const arrow=document.getElementById('accArrow');const isOpen=menu.style.display==='block';menu.style.display=isOpen?'none':'block';arrow.style.transform=isOpen?'rotate(0deg)':'rotate(180deg)';}
function saveTok(){const t=document.getElementById('tokIn').value;if(!t){alert('Insira o token');return;}fetch('/api/auth/save_token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:t,account_type:selectedAcct})}).then(r=>r.json()).then(d=>{if(d.error)alert('❌ '+d.error);else alert('✅ Token guardado!');});}
function conectar(){
    if(isConn){alert('Já conectado!');return;}
    const btn=document.getElementById('conBtn');btn.disabled=true;btn.textContent='🔄 CONECTANDO...';
    fetch('/api/connect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({account_type:selectedAcct,symbol:curSym})}).then(r=>r.json()).then(d=>{
        btn.disabled=false;
        if(d.error){alert('❌ '+d.error);btn.textContent='🔌 CONECTAR';}
        else{btn.textContent='✅ CONECTADO';btn.style.background='#2a3342';isConn=true;}
    });
}
/* ----- Trades ----- */
function trade(action){
    const amt=parseFloat(document.getElementById('amt').value);
    if(amt<0.35||amt>100){alert('Valor entre $0.35 e $100');return;}
    const isMan=document.getElementById('manMode').checked;
    const url=isMan?'/api/trade/manual':(modo==='hybrid'?'/api/trade/hybrid':'/api/trade');
    fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,amount:amt})}).then(r=>r.json()).then(d=>{if(d.error)toast('❌ '+d.error,'loss');else toast('⏳ Trade enviado!','info');});
}
function tradeDigit(pred){
    const amt=parseFloat(document.getElementById('amtDig').value||'0.35');
    if(amt<0.35||amt>100){alert('Valor entre $0.35 e $100');return;}
    const label=pred==='odd'?'ÍMPAR':'PAR';
    fetch('/api/trade/digit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prediction:pred,amount:amt})}).then(r=>r.json()).then(d=>{
        if(d.error){toast('❌ '+d.error,'loss',4000);}
        else{
            const tr=d.ticks_remaining||10;
            toast(`⏳ $${amt.toFixed(2)} em ${label} → resultado em ~${tr} ticks`,'info',5000);
            setTimeout(loadHistory,3000);setTimeout(loadHistory,8000);setTimeout(loadHistory,14000);
        }
    });
}
function togglePause(){paused=!paused;fetch('/api/pause',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({paused})});document.getElementById('pauseBtn').innerHTML=paused?'▶️ RESUMIR':'⏸️ PAUSAR';}
